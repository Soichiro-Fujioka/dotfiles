# borrowed from: https://github.com/craftzdog/dotfiles-public/blob/master/.config/tmux/utility.conf

# Display lazygit
bind -r g display-popup -d '#{pane_current_path}' -w90% -h90% -E lazygit

# Display hunk diff --watch
bind -r r display-popup -d '#{pane_current_path}' -w90% -h90% -E 'hunk diff --watch'

# Run Terminnal in a separate session
bind -r t run-shell '\
  SESSION="term-$(echo #{pane_current_path} | md5sum | cut -c1-8)"; \
  tmux has-session -t "$SESSION" 2>/dev/null || \
  tmux new-session -d -s "$SESSION" -c "#{pane_current_path}" "fish"; \
  tmux display-popup -w90% -h90% -E "tmux attach-session -t $SESSION"'

# Run OpenCode with Codex fallback in a separate session
if-shell '! command -v claude >/dev/null 2>&1' {
  bind -r y run-shell '\
    SESSION="agent-$(echo #{pane_current_path} | md5sum | cut -c1-8)"; \
    tmux has-session -t "$SESSION" 2>/dev/null || \
    tmux new-session -d -s "$SESSION" -c "#{pane_current_path}" "sh -lc '\''if command -v opencode >/dev/null 2>&1; then opencode; else exec codex; fi'\''"; \
    tmux display-popup -w90% -h90% -E "tmux attach-session -t $SESSION"'
}
